<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }
        
        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            text-align: center;
            font-size: 22px;
        }
        
        .container {
            width: 80%;
            margin: auto;
            margin-top: 30px;
            text-align: center;
        }
        
        .card {
            display: inline-block;
            width: 200px;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        
        .card h3 {
            margin: 0;
        }
        
        img {
            margin-top: 30px;
            border-radius: 10px;
        }
        
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="navbar">📊 Dashboard</div>

    <div class="container">

        <div class="card">
            <h3>Total</h3>
            <p>₹ {{ total }}</p>
        </div>

        <div class="card">
            <h3>Average</h3>
            <p>₹ {{ avg }}</p>
        </div>

        <br>

        <img src="/static/graph.png" width="400">

        <br>
        <a href="/">⬅ Back</a>

    </div>

</body>

</html>
