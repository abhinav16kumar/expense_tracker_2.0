<!DOCTYPE html>
<html>

<head>
    <title>Add Expense</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }
        
        .container {
            width: 40%;
            margin: auto;
            margin-top: 80px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        
        h2 {
            text-align: center;
        }
        
        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #2ecc71;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
        }
        
        button:hover {
            background: #27ae60;
        }
        
        a {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Add Expense</h2>

        <form method="POST">
            <label>Amount</label>
            <input type="number" name="amount" required>

            <label>Category</label>
            <select name="category">
            <option>Food</option>
            <option>Travel</option>
            <option>Shopping</option>
            <option>Other</option>
        </select>

            <button type="submit">Add Expense</button>
        </form>

        <a href="/">⬅ Back</a>
    </div>

</body>

</html>
