<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            display: grid;
            min-height: 100vh;
            place-items: center;
        }
        .card {
            background: #fff;
            max-width: 720px;
            margin: 24px;
            padding: 28px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        p {
            color: #4d5b6b;
            line-height: 1.6;
        }
        code {
            background: #eef3f8;
            padding: 2px 6px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Expense Tracker</h1>
        <p>This project is a Flask app and cannot run fully on GitHub Pages.</p>
        <p>Run it locally with <code>python app.py</code> and open <code>http://127.0.0.1:5000/</code>.</p>
    </div>
</body>
</html>
